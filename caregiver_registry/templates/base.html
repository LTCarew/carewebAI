<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>{% block title %}Care Registry{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        nav {
            margin-bottom: 30px;
        }

        nav a {
            margin-right: 15px;
        }

        .container {
            max-width: 1000px;
        }

        .message {
            padding: 10px;
            background: #efefef;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<nav aria-label="Main Navigation">
    <a href="/">Home</a>

    {% if user.is_authenticated %}
        <a href="/dashboard/">Dashboard</a>
        <a href="/logout/">Logout</a>
    {% else %}
        <a href="/login/">Login</a>
    {% endif %}
</nav>

<main class="container">
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
